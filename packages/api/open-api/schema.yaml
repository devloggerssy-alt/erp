paths:
  /api/login:
    post:
      tags:
        - Auth
      summary: Login
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n  \"email\": \"admin@admin.com\",\n  \"password\":
                \"12345678\"\n}"
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                token: 1|YOUR_SANCTUM_TOKEN
                user:
